<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il mio diario</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1410;
    --paper: #f5f0e8;
    --warm: #8b6f47;
    --warm-light: #c4a882;
    --accent: #6b4c2a;
    --faint: rgba(139,111,71,0.15);
    --shadow: rgba(28,20,16,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(196,168,130,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(107,76,42,0.10) 0%, transparent 60%);
  }

  /* LOCK */
  #lockScreen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 30% 30%, rgba(196,168,130,0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(107,76,42,0.12) 0%, transparent 55%);
    z-index: 1000;
    animation: fadeIn 0.6s ease;
  }
  .lock-box { text-align: center; padding: 3rem 2.5rem; max-width: 360px; width: 90%; }
  .lock-title { font-size: 2.8rem; font-weight: 300; font-style: italic; color: var(--accent); margin-bottom: 0.3rem; }
  .lock-sub { font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 300; letter-spacing: 0.22em; color: var(--warm-light); text-transform: uppercase; margin-bottom: 2.5rem; }
  .lock-ornament { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--warm-light), transparent); margin: 0 auto 2.5rem; }
  #passwordInput {
    width: 100%; padding: 0.9rem 1.2rem; border: 1px solid var(--warm-light); border-radius: 2px;
    background: rgba(255,255,255,0.5); font-family: 'Jost', sans-serif; font-size: 0.9rem;
    font-weight: 300; letter-spacing: 0.15em; color: var(--ink); outline: none;
    text-align: center; transition: border-color 0.3s, background 0.3s; margin-bottom: 1rem;
  }
  #passwordInput:focus { border-color: var(--warm); background: rgba(255,255,255,0.8); }
  #passwordInput::placeholder { color: var(--warm-light); }
  .lock-btn {
    width: 100%; padding: 0.85rem; background: var(--accent); color: var(--paper);
    border: none; border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 0.75rem;
    font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
    transition: background 0.3s, transform 0.15s;
  }
  .lock-btn:hover { background: var(--warm); transform: translateY(-1px); }
  #lockError { margin-top: 1rem; font-family: 'Jost', sans-serif; font-size: 0.72rem; color: #a05040; letter-spacing: 0.1em; opacity: 0; transition: opacity 0.3s; }

  /* APP */
  #app { display: none; max-width: 900px; margin: 0 auto; padding: 3rem 2rem 6rem; animation: fadeIn 0.7s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--faint);
    flex-wrap: wrap; gap: 1rem;
  }
  .header-left { display: flex; align-items: baseline; gap: 1.2rem; flex-wrap: wrap; }
  .header-title { font-size: 2.4rem; font-weight: 300; font-style: italic; color: var(--accent); }
  .sync-status { font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--warm-light); display: flex; align-items: center; gap: 0.4rem; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warm-light); transition: background 0.3s; }
  .sync-dot.ok { background: #7aab6e; }
  .sync-dot.err { background: #a05040; }
  .sync-dot.loading { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-actions { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }

  .btn-sm {
    padding: 0.5rem 1.1rem; border: 1px solid var(--warm-light); background: transparent;
    color: var(--warm); border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 0.68rem;
    font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .btn-sm:hover { background: var(--warm); color: var(--paper); border-color: var(--warm); }
  .btn-danger { border-color: rgba(160,80,64,0.4); color: #a05040; }
  .btn-danger:hover { background: #a05040; color: var(--paper); border-color: #a05040; }

  /* CATEGORY PILLS */
  .category-pill {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.25rem 0.75rem; border-radius: 20px;
    font-family: 'Jost', sans-serif; font-size: 0.68rem; font-weight: 300;
    letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s;
    border: 1px solid transparent; white-space: nowrap;
  }
  .category-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .category-pill.selected { font-weight: 400; }

  /* FILTER BAR */
  .filter-bar {
    display: flex; align-items: center; gap: 0.6rem; margin-bottom: 2.5rem;
    flex-wrap: wrap; padding: 1rem 1.2rem;
    background: rgba(255,255,255,0.35); border: 1px solid rgba(196,168,130,0.2);
    border-radius: 3px;
  }
  .filter-label { font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-light); margin-right: 0.3rem; flex-shrink: 0; }
  .filter-pill {
    padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid rgba(196,168,130,0.4);
    background: transparent; font-family: 'Jost', sans-serif; font-size: 0.68rem;
    font-weight: 300; letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s;
    color: var(--warm);
  }
  .filter-pill:hover { border-color: var(--warm); background: var(--faint); }
  .filter-pill.active { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .filter-manage { margin-left: auto; }

  /* EDITOR */
  .editor-section {
    background: rgba(255,255,255,0.45); border: 1px solid rgba(196,168,130,0.3);
    border-radius: 3px; padding: 2.5rem; margin-bottom: 2.5rem; box-shadow: 0 2px 20px var(--shadow);
  }
  .entry-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .entry-date { font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 300; letter-spacing: 0.2em; color: var(--warm-light); text-transform: uppercase; }
  .mood-row { display: flex; gap: 0.5rem; }
  .mood-btn { background: none; border: 1px solid transparent; cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.3rem; border-radius: 50%; transition: all 0.2s; opacity: 0.5; line-height: 1; }
  .mood-btn:hover, .mood-btn.active { opacity: 1; border-color: var(--warm-light); background: var(--faint); }

  /* CATEGORY SELECTOR IN EDITOR */
  .category-selector { margin-bottom: 1.2rem; }
  .category-selector-label { font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-light); margin-bottom: 0.5rem; display: block; }
  .category-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .cat-chip {
    padding: 0.28rem 0.8rem; border-radius: 20px; border: 1px solid rgba(196,168,130,0.4);
    background: transparent; font-family: 'Jost', sans-serif; font-size: 0.68rem;
    font-weight: 300; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
    color: var(--warm); display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .cat-chip:hover { border-color: var(--warm); background: var(--faint); }
  .cat-chip.active { color: var(--paper); border-color: transparent; }
  .cat-chip .chip-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cat-chip-none { font-style: italic; opacity: 0.7; }

  #entryTitle {
    width: 100%; border: none; background: transparent;
    font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; font-style: italic;
    color: var(--ink); outline: none; margin-bottom: 1.2rem;
    border-bottom: 1px solid rgba(196,168,130,0.25); padding-bottom: 0.8rem;
  }
  #entryTitle::placeholder { color: rgba(139,111,71,0.35); }
  #entryText {
    width: 100%; border: none; background: transparent;
    font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300;
    line-height: 1.85; color: var(--ink); outline: none; resize: none; min-height: 220px;
  }
  #entryText::placeholder { color: rgba(139,111,71,0.35); font-style: italic; }

  .editor-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1.8rem; padding-top: 1.2rem; border-top: 1px solid var(--faint); flex-wrap: wrap; gap: 1rem;
  }
  .char-count { font-family: 'Jost', sans-serif; font-size: 0.68rem; color: var(--warm-light); letter-spacing: 0.15em; }
  .editor-btns { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
  .btn-voice {
    padding: 0.5rem 1.1rem; border: 1px solid var(--warm-light); background: transparent;
    color: var(--warm); border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 0.68rem;
    font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem;
  }
  .btn-voice.recording { background: #a05040; border-color: #a05040; color: var(--paper); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(160,80,64,0.4)} 50%{box-shadow:0 0 0 5px rgba(160,80,64,0)} }
  .btn-save {
    padding: 0.6rem 1.8rem; background: var(--accent); color: var(--paper); border: none;
    border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 300;
    letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { background: var(--warm); transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ENTRIES */
  .entries-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.8rem; }
  .entries-label { font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--warm-light); }
  #searchInput {
    padding: 0.45rem 0.9rem; border: 1px solid rgba(196,168,130,0.4);
    background: rgba(255,255,255,0.4); border-radius: 2px; font-family: 'Jost', sans-serif;
    font-size: 0.72rem; color: var(--ink); outline: none; width: 180px; transition: border-color 0.2s, background 0.2s;
  }
  #searchInput:focus { border-color: var(--warm); background: rgba(255,255,255,0.7); }
  #searchInput::placeholder { color: var(--warm-light); }

  .entry-card {
    background: rgba(255,255,255,0.4); border: 1px solid rgba(196,168,130,0.25);
    border-radius: 3px; padding: 1.5rem 1.8rem; margin-bottom: 1rem;
    cursor: pointer; transition: all 0.25s; position: relative;
  }
  .entry-card:hover { background: rgba(255,255,255,0.7); border-color: var(--warm-light); transform: translateX(3px); box-shadow: 0 2px 14px var(--shadow); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.4rem; }
  .card-title { font-size: 1.25rem; font-weight: 400; font-style: italic; color: var(--accent); flex: 1; }
  .card-mood { font-size: 1rem; margin-left: 0.4rem; }
  .card-date { font-family: 'Jost', sans-serif; font-size: 0.65rem; color: var(--warm-light); letter-spacing: 0.15em; white-space: nowrap; margin-left: 1rem; flex-shrink: 0; }
  .card-category {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.18rem 0.6rem; border-radius: 20px; margin-bottom: 0.5rem;
    font-family: 'Jost', sans-serif; font-size: 0.62rem; letter-spacing: 0.1em;
  }
  .card-category .pill-dot { width: 5px; height: 5px; border-radius: 50%; }
  .card-preview { font-size: 0.95rem; color: rgba(28,20,16,0.6); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card-delete { position: absolute; top: 0.8rem; right: 0.8rem; background: none; border: none; color: rgba(160,80,64,0.3); cursor: pointer; font-size: 0.85rem; padding: 0.3rem; transition: color 0.2s; opacity: 0; }
  .entry-card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: #a05040; }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--warm-light); font-style: italic; font-size: 1.1rem; opacity: 0.7; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 2rem; right: 2rem; background: var(--accent); color: var(--paper);
    padding: 0.8rem 1.5rem; border-radius: 2px; font-family: 'Jost', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.15em; opacity: 0; transform: translateY(8px);
    transition: all 0.3s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* MODAL */
  #modal { position: fixed; inset: 0; background: rgba(28,20,16,0.5); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(3px); }
  #modal.open { display: flex; }
  .modal-box { background: var(--paper); border: 1px solid var(--warm-light); border-radius: 3px; padding: 2.5rem; max-width: 460px; width: 90%; animation: fadeIn 0.3s ease; }
  .modal-title { font-size: 1.5rem; font-style: italic; color: var(--accent); margin-bottom: 0.8rem; text-align: center; }
  .modal-text { font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 300; color: rgba(28,20,16,0.6); margin-bottom: 1.5rem; line-height: 1.7; text-align: center; }
  .modal-text input {
    width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--warm-light);
    background: rgba(255,255,255,0.6); border-radius: 2px; font-family: 'Jost', sans-serif;
    font-size: 0.85rem; color: var(--ink); outline: none; margin-top: 0.8rem;
    text-align: center; letter-spacing: 0.1em;
  }
  .modal-btns { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }

  /* CATEGORIES MANAGER */
  .cat-manager-list { margin-bottom: 1.2rem; max-height: 260px; overflow-y: auto; }
  .cat-row {
    display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0.2rem;
    border-bottom: 1px solid var(--faint);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
  .cat-color-dot:hover { transform: scale(1.3); }
  .cat-name-input {
    flex: 1; border: none; background: transparent; font-family: 'Jost', sans-serif;
    font-size: 0.8rem; color: var(--ink); outline: none; padding: 0.2rem 0;
    border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  .cat-name-input:focus { border-bottom-color: var(--warm-light); }
  .cat-del-btn { background: none; border: none; color: rgba(160,80,64,0.35); cursor: pointer; font-size: 0.8rem; padding: 0.2rem; transition: color 0.2s; }
  .cat-del-btn:hover { color: #a05040; }
  .cat-add-row { display: flex; gap: 0.6rem; align-items: center; margin-top: 0.8rem; }
  .cat-add-input {
    flex: 1; padding: 0.55rem 0.9rem; border: 1px solid rgba(196,168,130,0.4);
    background: rgba(255,255,255,0.5); border-radius: 2px; font-family: 'Jost', sans-serif;
    font-size: 0.78rem; color: var(--ink); outline: none; transition: border-color 0.2s;
  }
  .cat-add-input:focus { border-color: var(--warm); }
  .cat-add-input::placeholder { color: var(--warm-light); }
  .color-picker-row { display: flex; gap: 0.5rem; margin: 0.6rem 0 0; flex-wrap: wrap; }
  .color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: var(--ink); transform: scale(1.15); }

  @media (max-width: 600px) {
    #app { padding: 2rem 1.2rem 5rem; }
    .editor-section { padding: 1.5rem; }
    .header-title { font-size: 1.8rem; }
    #searchInput { width: 130px; }
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-title">Il mio diario</div>
    <div class="lock-sub">uno spazio tutto tuo</div>
    <div class="lock-ornament"></div>
    <input type="password" id="passwordInput" placeholder="password" autocomplete="current-password">
    <button class="lock-btn" onclick="unlock()">Entra</button>
    <div id="lockError">Password errata. Riprova.</div>
  </div>
</div>

<div id="toast"></div>

<div id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-text" id="modalText"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Il mio diario</div>
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">—</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-sm" onclick="loadAll()">↻ Aggiorna</button>
      <button class="btn-sm" onclick="exportDiary()">Esporta</button>
      <button class="btn-sm" onclick="changePassword()">Cambia password</button>
      <button class="btn-sm btn-danger" onclick="lockApp()">Esci</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Categoria</span>
    <button class="filter-pill active" data-filter="all">Tutte</button>
    <div id="filterPills"></div>
    <button class="btn-sm filter-manage" onclick="manageCategories()">+ Gestisci</button>
  </div>

  <!-- EDITOR -->
  <div class="editor-section">
    <div class="entry-meta">
      <div class="entry-date" id="todayDate"></div>
      <div class="mood-row" id="moodRow"></div>
    </div>

    <div class="category-selector">
      <span class="category-selector-label">Categoria</span>
      <div class="category-chips" id="categoryChips"></div>
    </div>

    <input type="text" id="entryTitle" placeholder="Titolo (opzionale)">
    <textarea id="entryText" placeholder="Scrivi quello che senti..."></textarea>
    <div class="editor-footer">
      <div class="char-count"><span id="charCount">0</span> caratteri</div>
      <div class="editor-btns">
        <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()">🎙 Detta</button>
        <button class="btn-save" id="saveBtn" onclick="saveEntry()">Salva</button>
      </div>
    </div>
  </div>

  <!-- ENTRIES -->
  <div class="entries-header">
    <div class="entries-label">Le tue pagine</div>
    <input type="text" id="searchInput" placeholder="Cerca..." oninput="renderEntries()">
  </div>
  <div id="entriesList"></div>
</div>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://znsvjghwquppfifiacjr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpuc3ZqZ2h3cXVwcGZpZmlhY2pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzkxMDUsImV4cCI6MjA4OTE1NTEwNX0.9WZ1-0NNjqV8apKvUJzIb9oBbwjA3BKJbdG_wONAjH0';
const ENTRIES_API    = `${SUPABASE_URL}/rest/v1/entries`;
const CATEGORIES_API = `${SUPABASE_URL}/rest/v1/categories`;
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

const PASS_KEY = 'diario_pass';
const DEFAULT_PASS = 'diario';
const MOODS = ['☀️','🌧','🌙','🌸','🔥','🌿'];
const PALETTE = ['#c4a882','#8b6f47','#6b4c2a','#7aab6e','#5a8f7a','#8b7aab','#ab7a8b','#ab9b5a','#5a7aab','#a05040'];

let allEntries    = [];
let allCategories = [];
let currentEditId  = null;
let selectedMood   = '';
let selectedCatId  = null;   // editor
let filterCatId    = 'all';  // filter bar
let recognition    = null;
let isRecording    = false;

// ── PASSWORD ──
function getPass() { return localStorage.getItem(PASS_KEY) || DEFAULT_PASS; }

function unlock() {
  const val = document.getElementById('passwordInput').value;
  const err = document.getElementById('lockError');
  if (val === getPass()) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    err.style.opacity = '1';
    document.getElementById('passwordInput').value = '';
    setTimeout(() => err.style.opacity = '0', 2500);
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// ── SUPABASE ──
async function sbFetch(method, url, body) {
  const opts = { method, headers: { ...HEADERS } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadAll() {
  setSyncStatus('loading', 'sincronizzazione…');
  try {
    const [entries, cats] = await Promise.all([
      sbFetch('GET', `${ENTRIES_API}?order=date.desc`, null),
      sbFetch('GET', `${CATEGORIES_API}?order=name.asc`, null)
    ]);
    allEntries    = entries    || [];
    allCategories = cats       || [];
    setSyncStatus('ok', 'sincronizzato');
    renderFilterBar();
    renderCategoryChips();
    renderEntries();
  } catch(e) {
    setSyncStatus('err', 'errore connessione');
    showToast('Impossibile connettersi. Controlla la connessione.');
  }
}

function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

// ── INIT ──
function init() {
  setTodayDate();
  initMoods();
  loadAll();
  document.getElementById('entryText').addEventListener('input', updateCount);
}

function setTodayDate() {
  document.getElementById('todayDate').textContent =
    new Date().toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function initMoods() {
  const row = document.getElementById('moodRow');
  MOODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn'; btn.textContent = m;
    btn.onclick = () => {
      selectedMood = selectedMood === m ? '' : m;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      if (selectedMood) btn.classList.add('active');
    };
    row.appendChild(btn);
  });
}

function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('entryText').value.length;
}

// ── FILTER BAR ──
function renderFilterBar() {
  const pills = document.getElementById('filterPills');
  pills.innerHTML = allCategories.map(c => `
    <button class="filter-pill${filterCatId === c.id ? ' active' : ''}" data-filter="${c.id}" style="${filterCatId === c.id ? `background:${c.color};border-color:${c.color}` : ''}">
      ${c.name}
    </button>`).join('');

  // "Tutte" button
  const allBtn = document.querySelector('.filter-pill[data-filter="all"]');
  allBtn.classList.toggle('active', filterCatId === 'all');

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      filterCatId = btn.dataset.filter;
      renderFilterBar();
      renderEntries();
    });
  });
}

// ── CATEGORY CHIPS IN EDITOR ──
function renderCategoryChips() {
  const container = document.getElementById('categoryChips');
  // "Nessuna" chip
  const noneActive = !selectedCatId;
  let html = `<button class="cat-chip cat-chip-none${noneActive ? ' active' : ''}" data-cat="none" style="${noneActive ? 'background:var(--warm-light);border-color:var(--warm-light);' : ''}">nessuna</button>`;
  html += allCategories.map(c => {
    const active = selectedCatId === c.id;
    return `<button class="cat-chip${active ? ' active' : ''}" data-cat="${c.id}"
      style="${active ? `background:${c.color};border-color:${c.color};` : `border-color:${c.color};color:${c.color};`}">
      <span class="chip-dot" style="background:${c.color}"></span>${c.name}
    </button>`;
  }).join('');
  container.innerHTML = html;

  container.querySelectorAll('.cat-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedCatId = btn.dataset.cat === 'none' ? null : btn.dataset.cat;
      renderCategoryChips();
    });
  });
}

// ── SAVE ENTRY ──
async function saveEntry() {
  const title = document.getElementById('entryTitle').value.trim();
  const text  = document.getElementById('entryText').value.trim();
  if (!text && !title) { showToast('Scrivi qualcosa prima di salvare.'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Salvataggio…';
  setSyncStatus('loading', 'salvataggio…');

  const payload = { title, text, mood: selectedMood, category_id: selectedCatId || null };

  try {
    if (currentEditId) {
      await sbFetch('PATCH', `${ENTRIES_API}?id=eq.${currentEditId}`, { ...payload, edited: new Date().toISOString() });
    } else {
      await sbFetch('POST', ENTRIES_API, { ...payload, date: new Date().toISOString() });
    }
    resetEditor();
    await loadAll();
    showToast('Salvato ✓');
  } catch(e) {
    setSyncStatus('err', 'errore');
    showToast('Errore nel salvataggio. Riprova.');
  } finally {
    btn.disabled = false; btn.textContent = 'Salva';
  }
}

function resetEditor() {
  document.getElementById('entryTitle').value = '';
  document.getElementById('entryText').value = '';
  document.getElementById('charCount').textContent = '0';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  selectedMood = ''; selectedCatId = null; currentEditId = null;
  setTodayDate();
  renderCategoryChips();
}

// ── RENDER ENTRIES ──
function renderEntries() {
  const list = document.getElementById('entriesList');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();

  let entries = allEntries;
  if (filterCatId !== 'all') {
    entries = entries.filter(e => e.category_id === filterCatId);
  }
  if (q) {
    entries = entries.filter(e =>
      (e.title||'').toLowerCase().includes(q) || (e.text||'').toLowerCase().includes(q)
    );
  }

  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">${q || filterCatId !== 'all' ? 'Nessun risultato trovato.' : 'Il diario è ancora vuoto.<br>Scrivi la tua prima pagina.'}</div>`;
    return;
  }

  list.innerHTML = entries.map(e => {
    const ds = new Date(e.date).toLocaleDateString('it-IT', { day:'numeric', month:'short', year:'numeric' });
    const preview = (e.text||'').replace(/\n/g,' ').slice(0, 120);
    const safeTitle = (e.title||'Senza titolo').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const safePreview = preview.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const cat = allCategories.find(c => c.id === e.category_id);
    const catBadge = cat
      ? `<div class="card-category" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">
           <span class="pill-dot" style="background:${cat.color}"></span>${cat.name}
         </div>`
      : '';
    return `
      <div class="entry-card" data-id="${e.id}">
        <button class="card-delete" data-id="${e.id}">✕</button>
        <div class="card-top">
          <div class="card-title">${safeTitle} <span class="card-mood">${e.mood||''}</span></div>
          <div class="card-date">${ds}</div>
        </div>
        ${catBadge}
        <div class="card-preview">${safePreview}${(e.text||'').length > 120 ? '…' : ''}</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.entry-card').forEach(card => {
    card.addEventListener('click', () => editEntry(card.dataset.id));
  });
  list.querySelectorAll('.card-delete').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteEntry(btn.dataset.id); });
  });
}

// ── EDIT ENTRY ──
function editEntry(id) {
  const e = allEntries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('entryTitle').value = e.title || '';
  document.getElementById('entryText').value  = e.text  || '';
  updateCount();
  selectedMood  = e.mood || '';
  selectedCatId = e.category_id || null;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.textContent === selectedMood));
  renderCategoryChips();
  currentEditId = id;
  document.getElementById('todayDate').textContent =
    'Modifica · ' + new Date(e.date).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── DELETE ENTRY ──
function deleteEntry(id) {
  showModal('Eliminare questa pagina?', 'Questa azione è irreversibile.', [
    { label: 'Annulla', fn: closeModal, style: '' },
    { label: 'Elimina', fn: () => doDeleteEntry(id), style: 'btn-danger' }
  ]);
}
async function doDeleteEntry(id) {
  closeModal(); setSyncStatus('loading', 'eliminazione…');
  try {
    await sbFetch('DELETE', `${ENTRIES_API}?id=eq.${id}`, null);
    if (currentEditId === id) resetEditor();
    await loadAll(); showToast('Pagina eliminata.');
  } catch(e) { setSyncStatus('err', 'errore'); showToast('Errore nella cancellazione.'); }
}

// ── MANAGE CATEGORIES ──
let newCatColor = PALETTE[0];

function manageCategories() {
  newCatColor = PALETTE[0];
  renderCatManager();
}

function renderCatManager() {
  const listHtml = allCategories.length
    ? allCategories.map(c => `
        <div class="cat-row" data-id="${c.id}">
          <div class="cat-color-dot" style="background:${c.color};border-color:${c.color}" title="Colore"></div>
          <input class="cat-name-input" value="${c.name.replace(/"/g,'&quot;')}" data-id="${c.id}" maxlength="30">
          <button class="cat-del-btn" data-id="${c.id}">✕</button>
        </div>`).join('')
    : '<div style="font-family:Jost,sans-serif;font-size:0.78rem;color:var(--warm-light);padding:0.5rem 0;font-style:italic;">Nessuna categoria ancora.</div>';

  const swatches = PALETTE.map(color =>
    `<div class="color-swatch${color === newCatColor ? ' selected' : ''}" style="background:${color}" data-color="${color}"></div>`
  ).join('');

  const content = `
    <div class="cat-manager-list" id="catManagerList">${listHtml}</div>
    <div style="border-top:1px solid var(--faint);padding-top:1rem;">
      <div style="font-family:Jost,sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--warm-light);margin-bottom:0.4rem;">Nuova categoria</div>
      <div class="cat-add-row">
        <input class="cat-add-input" id="newCatName" placeholder="Nome categoria" maxlength="30">
        <div class="cat-color-dot" id="newCatDot" style="background:${newCatColor};border-color:${newCatColor};width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid transparent"></div>
      </div>
      <div class="color-picker-row" id="colorPickerRow">${swatches}</div>
    </div>`;

  showModal('Categorie', content, [
    { label: 'Chiudi', fn: closeModal, style: '' },
    { label: '+ Aggiungi', fn: addCategory, style: '' }
  ]);

  // existing: rename
  document.querySelectorAll('.cat-name-input').forEach(inp => {
    inp.addEventListener('change', () => renameCategory(inp.dataset.id, inp.value.trim()));
  });
  // existing: delete
  document.querySelectorAll('.cat-del-btn').forEach(btn => {
    btn.addEventListener('click', () => confirmDeleteCategory(btn.dataset.id));
  });
  // color swatches
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      newCatColor = sw.dataset.color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      document.getElementById('newCatDot').style.background = newCatColor;
      document.getElementById('newCatDot').style.borderColor = newCatColor;
    });
  });
  // enter key on new cat input
  document.getElementById('newCatName').addEventListener('keydown', e => { if (e.key === 'Enter') addCategory(); });
}

async function addCategory() {
  const name = document.getElementById('newCatName')?.value?.trim();
  if (!name) { showToast('Inserisci un nome per la categoria.'); return; }
  if (allCategories.find(c => c.name.toLowerCase() === name.toLowerCase())) {
    showToast('Categoria già esistente.'); return;
  }
  try {
    setSyncStatus('loading', 'salvataggio…');
    await sbFetch('POST', CATEGORIES_API, { name, color: newCatColor });
    await loadAll();
    setSyncStatus('ok', 'sincronizzato');
    showToast(`Categoria "${name}" aggiunta ✓`);
    manageCategories(); // re-render modal
  } catch(e) { showToast('Errore nel salvataggio.'); }
}

async function renameCategory(id, name) {
  if (!name) return;
  try {
    await sbFetch('PATCH', `${CATEGORIES_API}?id=eq.${id}`, { name });
    await loadAll(); setSyncStatus('ok', 'sincronizzato');
  } catch(e) { showToast('Errore nel rinominare.'); }
}

function confirmDeleteCategory(id) {
  const cat = allCategories.find(c => c.id === id);
  const count = allEntries.filter(e => e.category_id === id).length;
  const warn = count > 0 ? `<br><br>Le ${count} pagine collegate perderanno la categoria.` : '';
  showModal(
    `Eliminare "${cat?.name}"?`,
    `Questa azione è irreversibile.${warn}`,
    [
      { label: 'Annulla', fn: () => { closeModal(); manageCategories(); }, style: '' },
      { label: 'Elimina', fn: () => doDeleteCategory(id), style: 'btn-danger' }
    ]
  );
}

async function doDeleteCategory(id) {
  closeModal();
  try {
    await sbFetch('DELETE', `${CATEGORIES_API}?id=eq.${id}`, null);
    if (selectedCatId === id) selectedCatId = null;
    if (filterCatId  === id) filterCatId = 'all';
    await loadAll(); showToast('Categoria eliminata.');
  } catch(e) { showToast('Errore nella cancellazione.'); }
}

// ── VOICE ──
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Dettatura non supportata su questo browser.'); return;
  }
  isRecording ? stopVoice() : startVoice();
}
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'it-IT'; recognition.continuous = true; recognition.interimResults = true;
  const textarea = document.getElementById('entryText');
  const btn = document.getElementById('voiceBtn');
  let base = textarea.value;
  recognition.onstart = () => { isRecording = true; btn.textContent = '⏹ Stop'; btn.classList.add('recording'); };
  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) base += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    textarea.value = base + interim; updateCount();
  };
  recognition.onend = () => stopVoice();
  recognition.onerror = () => stopVoice();
  recognition.start();
}
function stopVoice() {
  if (recognition) recognition.stop();
  isRecording = false;
  const btn = document.getElementById('voiceBtn');
  btn.textContent = '🎙 Detta'; btn.classList.remove('recording');
}

// ── EXPORT ──
function exportDiary() {
  if (!allEntries.length) { showToast('Nessuna pagina da esportare.'); return; }
  const lines = allEntries.map(e => {
    const d   = new Date(e.date).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
    const cat = allCategories.find(c => c.id === e.category_id);
    return `──────────────────────\n${d}${e.mood ? ' ' + e.mood : ''}${cat ? ' [' + cat.name + ']' : ''}\n${e.title ? e.title + '\n' : ''}\n${e.text}\n`;
  });
  const blob = new Blob(['IL MIO DIARIO\n\n' + lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `diario_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); showToast('Esportato ✓');
}

// ── CHANGE PASSWORD ──
function changePassword() {
  showModal('Cambia password',
    `<input type="password" id="newPass1" placeholder="Nuova password">
     <input type="password" id="newPass2" placeholder="Conferma password" style="margin-top:0.5rem">`,
    [{ label: 'Annulla', fn: closeModal, style: '' }, { label: 'Salva', fn: doChangePass, style: '' }]
  );
}
function doChangePass() {
  const p1 = document.getElementById('newPass1')?.value;
  const p2 = document.getElementById('newPass2')?.value;
  if (!p1) { showToast('Inserisci una password.'); return; }
  if (p1 !== p2) { showToast('Le password non coincidono.'); return; }
  localStorage.setItem(PASS_KEY, p1); closeModal(); showToast('Password aggiornata ✓');
}

// ── LOCK ──
function lockApp() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── MODAL ──
function showModal(title, text, buttons) {
  document.getElementById('modalTitle').innerHTML = title;
  document.getElementById('modalText').innerHTML  = text;
  document.getElementById('modalBtns').innerHTML  = '';
  buttons.forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn-sm ' + (b.style||''); el.textContent = b.label; el.onclick = b.fn;
    document.getElementById('modalBtns').appendChild(el);
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>
